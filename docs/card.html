<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Confettis &amp; Cake — Carte animée</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #card-wrap {
      position: relative;
      width: 100%;
      max-width: 420px;
      aspect-ratio: 9/16;
      overflow: hidden;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    #bg-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    #text-overlay {
      position: absolute;
      inset: 0;
      bottom: 52px;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 10px;
      opacity: 0;
    }
    #text-overlay.pos-top    { justify-content: flex-start; padding-top: 80px; }
    #text-overlay.pos-bottom { justify-content: flex-end; }
    #text-overlay.pos-center { justify-content: center; }
    #occasion-emoji {
      font-size: 120px;
      text-align: center;
      filter: drop-shadow(0 6px 20px rgba(0,0,0,0.4));
      animation: fadeIn 0.8s ease forwards;
      line-height: 1.1;
    }
    #prefix-text {
      font-size: 26px; font-weight: 700;
      text-align: center; line-height: 1.3;
      text-shadow: 0 2px 14px rgba(0,0,0,0.6);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #name-text {
      font-size: 64px; font-weight: 900;
      text-align: center; line-height: 1.0;
      letter-spacing: -1px;
      text-shadow: 0 4px 24px rgba(0,0,0,0.6);
    }
    #suffix-text {
      font-size: 36px; font-weight: 700;
      text-align: center;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }
    #deco-line {
      width: 80px; height: 3px;
      background: rgba(255,255,255,0.5);
      border-radius: 99px;
      margin: 6px auto;
    }
    #contact-photo {
      display: none;
      width: 90px; height: 90px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255,255,255,0.8);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      margin-bottom: 4px;
      animation: fadeIn 0.8s ease forwards;
    }
    #branding {
      position: absolute;
      bottom: 16px; left: 0; right: 0;
      z-index: 4; text-align: center;
      font-size: 11px; color: rgba(255,255,255,0.5);
      letter-spacing: 0.5px;
    }
    #branding a { color: rgba(255,255,255,0.65); text-decoration: none; }
    #loading {
      position: absolute; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1a1a2e; gap: 16px;
    }
    .spin {
      width: 44px; height: 44px;
      border: 3px solid rgba(155,107,181,0.3);
      border-top-color: #9b6bb5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .spin-lbl { font-size: 14px; color: rgba(255,255,255,0.6); }
    #error-box {
      position: absolute; inset: 0; z-index: 10;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1a1a2e; gap: 12px; padding: 32px; text-align: center;
    }
    .err-icon { font-size: 48px; }
    .err-title { font-size: 18px; font-weight: 700; color: #fff; }
    .err-sub { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.5; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bounceIn {
      0%   { opacity:0; transform:scale(0.3); }
      50%  { opacity:1; transform:scale(1.05); }
      70%  { transform:scale(0.9); }
      100% { transform:scale(1); }
    }
  </style>
</head>
<body>
  <div id="card-wrap">
    <div id="loading"><div class="spin"></div><div class="spin-lbl">Chargement…</div></div>
    <div id="error-box">
      <div class="err-icon">🎂</div>
      <div class="err-title">Carte introuvable</div>
      <div class="err-sub">Ce lien n'est plus valide.</div>
    </div>
    <canvas id="bg-canvas"></canvas>
    <div id="text-overlay" class="pos-center">
      <img id="contact-photo" alt="" />
      <div id="occasion-emoji"></div>
      <div id="prefix-text"></div>
      <div id="name-text"></div>
      <div id="suffix-text"></div>
    </div>
    <div id="message-box" style="display:none;position:absolute;bottom:52px;left:12px;right:12px;z-index:3;background:linear-gradient(135deg,rgba(60,0,80,0.75),rgba(0,0,60,0.75));backdrop-filter:blur(16px);border-radius:20px;padding:18px 20px;border:1px solid rgba(255,255,255,0.2);box-shadow:0 8px 32px rgba(0,0,0,0.4);">
      <div id="message-text" style="font-size:16px;color:rgba(255,255,255,0.95);line-height:1.65;white-space:pre-wrap;text-align:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;"></div>
      <div id="message-from" style="font-size:13px;color:rgba(255,255,255,0.6);margin-top:10px;font-style:italic;text-align:right;"></div>
    </div>
    <div id="music-hint" style="display:none;position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:5;background:rgba(0,0,0,0.55);border-radius:99px;padding:8px 18px;font-size:13px;color:#fff;font-weight:600;white-space:nowrap;">🎵 Appuie sur la carte pour la musique</div>
    <div id="mute-btn" onclick="toggleMute()" style="display:none;position:absolute;top:16px;right:16px;z-index:5;background:rgba(0,0,0,0.4);border-radius:99px;padding:8px 14px;cursor:pointer;font-size:14px;color:#fff;font-weight:600;">🔊 Son</div>
    <div id="branding">
      Créé par <strong style="color:rgba(255,255,255,0.75)">ConfettiCake</strong> by <a href="https://confetticake.fr" target="_blank">Confettis &amp; Cake</a>
      &nbsp;·&nbsp;
      <a href="https://confetticake.fr" target="_blank">confetticake.fr</a>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <script>
  var SUPABASE_URL = 'https://rlwxcbnsqokpirhzzurj.supabase.co';
  var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsd3hjYm5zcW9rcGlyaHp6dXJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjM0NjgsImV4cCI6MjA5MDUzOTQ2OH0.D7SBfjjnEqlJHplNyjVoqVzG-olLL6LFrHABzmieUC0';

  var SUPABASE_STORAGE = 'https://rlwxcbnsqokpirhzzurj.supabase.co/storage/v1/object/public/generated-audio/bg-music/';
  var p = new URLSearchParams(window.location.search);
  var cardId  = p.get('id')    || '';
  var name    = p.get('name')  || '';
  var age     = p.get('age')   || '';
  var message = p.get('msg')   || '';
  var sender  = p.get('from')  || '';
  var bgKey   = p.get('bg')    || '';
  var photoUrl = p.get('photo') || '';
  var animKey  = p.get('anim')  || '';

  // Lance la musique de fond si demandée
  var bgAudio = null;
  if (bgKey) {
    bgAudio = new Audio(SUPABASE_STORAGE + bgKey + '.mp3');
    bgAudio.loop   = true;
    bgAudio.volume = 0.4;
    bgAudio.play().catch(function(){});
  }

  // ── Thèmes d'animation par particules ──────────────────────────────────────
  var THEMES = {
    confetti: {
      bg: ['#7b2ff7','#c0392b'],
      particles: function(){ return {
        shapes: ['rect','rect','circle'], colors: ['#f9ca24','#f0932b','#6ab04c','#eb4d4b','#7ed6df','#e056fd','#686de0','#badc58','#fff'],
        count: 120, speedY: [2,6], speedX: [-2.5,2.5], rotation: true, size: [8,20]
      };}
    },
    birthday: {
      bg: ['#7b2ff7','#c0392b'],
      particles: function(){ return {
        shapes: ['rect','rect','circle'], colors: ['#f9ca24','#f0932b','#6ab04c','#eb4d4b','#7ed6df','#e056fd','#686de0','#badc58','#fff'],
        count: 120, speedY: [2,6], speedX: [-2.5,2.5], rotation: true, size: [8,20]
      };}
    },
    balloons: {
      bg: ['#1a6bc4','#4834d4'],
      particles: function(){ return {
        shapes: ['balloon'], colors: ['#fd79a8','#fdcb6e','#74b9ff','#ff7675','#a29bfe','#55efc4','#f9ca24'],
        count: 22, speedY: [-2.5,-0.8], speedX: [-0.5,0.5], rotation: false, size: [32,56]
      };}
    },
    stars: {
      bg: ['#0c0c2c','#1a1a4e'],
      particles: function(){ return {
        shapes: ['star'], colors: ['#ffeaa7','#fff','#fdcb6e','#e17055','#74b9ff','#a29bfe'],
        count: 80, speedY: [-0.4,0.4], speedX: [-0.4,0.4], rotation: true, size: [8,22]
      };}
    },
    hearts: {
      bg: ['#c0392b','#8e0038'],
      particles: function(){ return {
        shapes: ['heart'], colors: ['#ff7675','#fd79a8','#fdcb6e','#fff','#fab1d3'],
        count: 55, speedY: [-2.5,-0.5], speedX: [-1,1], rotation: false, size: [18,38]
      };}
    },
    flowers: {
      bg: ['#c44569','#e056fd'],
      particles: function(){ return {
        shapes: ['petal'], colors: ['#fd79a8','#ff7675','#fdcb6e','#fff','#fab1d3','#ffeaa7','#e056fd'],
        count: 55, speedY: [0.8,2.5], speedX: [-1.2,1.2], rotation: true, size: [14,30]
      };}
    },
    snow: {
      bg: ['#1e3a5f','#2c5f8a'],
      particles: function(){ return {
        shapes: ['circle'], colors: ['#fff','#dfe6e9','#b2bec3','#e0f7fa'],
        count: 100, speedY: [1,3.5], speedX: [-1.5,1.5], rotation: false, size: [4,14]
      };}
    },
    fireworks: {
      bg: ['#0d0d2b','#1a1a4e'],
      particles: function(){ return {
        shapes: ['circle','star'], colors: ['#f9ca24','#e056fd','#eb4d4b','#7ed6df','#6ab04c','#fff','#fdcb6e'],
        count: 90, speedY: [-4,4], speedX: [-4,4], rotation: true, size: [4,14]
      };}
    }
  };

  function getTheme(effectType, occasion) {
    if (THEMES[effectType]) return THEMES[effectType];
    if (occasion === 'birthday' || occasion === 'birthday_late') return THEMES.confetti;
    if (occasion === 'newyear') return THEMES.fireworks;
    if (occasion === 'christmas') return THEMES.snow;
    if (occasion === 'wedding' || occasion === 'engagement' || occasion === 'valentines') return THEMES.hearts;
    if (occasion === 'nameday' || occasion === 'mothersday') return THEMES.flowers;
    return THEMES.confetti;
  }

  // ── Moteur de particules Canvas ─────────────────────────────────────────────
  function startParticles(canvas, theme) {
    var W = canvas.width, H = canvas.height;
    var ctx = canvas.getContext('2d');
    var cfg = theme.particles();

    // Gradient de fond
    var grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0, theme.bg[0]);
    grad.addColorStop(1, theme.bg[1] || theme.bg[0]);

    function rand(a, b) { return a + Math.random() * (b - a); }
    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    var particles = [];
    for (var i = 0; i < cfg.count; i++) {
      var shape = pick(cfg.shapes);
      particles.push({
        x:     rand(0, W),
        y:     rand(-H, 0),
        w:     rand(cfg.size[0], cfg.size[1]),
        h:     rand(cfg.size[0], cfg.size[1]),
        color: pick(cfg.colors),
        shape: shape,
        vx:    rand(cfg.speedX[0], cfg.speedX[1]),
        vy:    rand(cfg.speedY[0], cfg.speedY[1]),
        rot:   (shape === 'balloon') ? 0 : rand(0, Math.PI * 2),
        rotV:  cfg.rotation ? rand(-0.05, 0.05) : 0,
        alpha: rand(0.7, 1),
      });
    }

    function drawStar(ctx, x, y, r) {
      var n = 5, inner = r * 0.4;
      ctx.beginPath();
      for (var k = 0; k < n * 2; k++) {
        var a = (k * Math.PI) / n - Math.PI / 2;
        var rr = k % 2 === 0 ? r : inner;
        k === 0 ? ctx.moveTo(x + rr * Math.cos(a), y + rr * Math.sin(a))
                : ctx.lineTo(x + rr * Math.cos(a), y + rr * Math.sin(a));
      }
      ctx.closePath();
    }

    function drawHeart(ctx, x, y, s) {
      var w = s * 0.55;
      ctx.beginPath();
      ctx.moveTo(x, y + w);
      ctx.bezierCurveTo(x - w * 0.1, y + w * 0.6, x - w * 1.5, y + w * 0.4, x - w * 1.5, y);
      ctx.bezierCurveTo(x - w * 1.5, y - w * 0.8, x - w * 0.6, y - w * 1.2, x, y - w * 0.6);
      ctx.bezierCurveTo(x + w * 0.6, y - w * 1.2, x + w * 1.5, y - w * 0.8, x + w * 1.5, y);
      ctx.bezierCurveTo(x + w * 1.5, y + w * 0.4, x + w * 0.1, y + w * 0.6, x, y + w);
      ctx.closePath();
    }

    function draw() {
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      for (var j = 0; j < particles.length; j++) {
        var pt = particles[j];
        ctx.save();
        ctx.globalAlpha = pt.alpha;
        ctx.fillStyle   = pt.color;
        ctx.translate(pt.x, pt.y);
        ctx.rotate(pt.rot);

        if      (pt.shape === 'rect')   { ctx.fillRect(-pt.w/2, -pt.h/4, pt.w, pt.h/2); }
        else if (pt.shape === 'circle') { ctx.beginPath(); ctx.arc(0, 0, pt.w/2, 0, Math.PI*2); ctx.fill(); }
        else if (pt.shape === 'star')   { drawStar(ctx, 0, 0, pt.w/2); ctx.fill(); }
        else if (pt.shape === 'heart')  { drawHeart(ctx, 0, 0, pt.w/2); ctx.fill(); }
        else if (pt.shape === 'balloon') {
          // Corps ovale
          ctx.beginPath(); ctx.ellipse(0, -pt.w*0.3, pt.w*0.38, pt.w*0.5, 0, 0, Math.PI*2); ctx.fill();
          // Nœud
          ctx.beginPath(); ctx.arc(0, pt.w*0.22, pt.w*0.07, 0, Math.PI*2); ctx.fill();
          // Ficelle
          ctx.strokeStyle = pt.color; ctx.globalAlpha = pt.alpha * 0.5; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(0, pt.w*0.29); ctx.quadraticCurveTo(pt.w*0.15, pt.w*0.55, 0, pt.w*0.75); ctx.stroke();
        }
        else if (pt.shape === 'petal') {
          // Pétale pointu aux deux extrémités
          var pw = pt.w * 0.28, ph = pt.w * 0.55;
          ctx.beginPath();
          ctx.moveTo(0, -ph);
          ctx.bezierCurveTo(pw, -ph * 0.3, pw, ph * 0.3, 0, ph);
          ctx.bezierCurveTo(-pw, ph * 0.3, -pw, -ph * 0.3, 0, -ph);
          ctx.closePath(); ctx.fill();
        }
        ctx.restore();

        pt.x   += pt.vx;
        pt.y   += pt.vy;
        pt.rot += pt.rotV;
        if (pt.y > H + 50)  { pt.y = -50; pt.x = rand(0, W); }
        if (pt.y < -50 && cfg.speedY[0] < 0) { pt.y = H + 50; pt.x = rand(0, W); }
        if (pt.x < -50) pt.x = W + 50;
        if (pt.x > W + 50) pt.x = -50;
      }
      requestAnimationFrame(draw);
    }
    draw();
  }

  // ── Animation du texte ───────────────────────────────────────────────────────
  function animEl(el, anim, delay) {
    el.style.opacity = '0';
    setTimeout(function() {
      el.style.animation = (anim === 'slide_up' ? 'slideUp' : anim === 'bounce' ? 'bounceIn' : 'fadeIn')
        + ' 0.7s cubic-bezier(0.25,0.46,0.45,0.94) forwards';
    }, delay);
  }

  function typewrite(el, text, delay) {
    el.style.opacity = '1';
    el.textContent = '';
    setTimeout(function go(i) {
      el.textContent = text.slice(0, i);
      if (i <= text.length) setTimeout(function(){ go(i+1); }, 60);
    }, delay, 0);
  }

  // ── Chargement principal ─────────────────────────────────────────────────────
  async function loadCard() {
    if (!cardId) { showError(); return; }
    try {
      var res  = await fetch(
        SUPABASE_URL + '/rest/v1/card_templates?id=eq.' + encodeURIComponent(cardId)
        + '&active=eq.true&select=*,background:card_backgrounds(*),effect:card_effects(*),text_style:card_text_styles(*)',
        { headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY } }
      );
      var data = await res.json();
      if (!data || !data[0]) { showError(); return; }

      var card  = data[0];
      var bg    = card.background || {};
      var eff   = card.effect     || {};
      var sty   = card.text_style || {};
      var cfg   = sty.config      || {};

      // ── Canvas animation ──────────────────────────────
      var canvas = document.getElementById('bg-canvas');
      var wrap   = document.getElementById('card-wrap');
      canvas.width  = wrap.clientWidth  || 360;
      canvas.height = wrap.clientHeight || 640;
      var theme = animKey && THEMES[animKey]
        ? THEMES[animKey]
        : getTheme(eff.effect_type || '', card.occasion || '');
      startParticles(canvas, theme);

      // ── Lottie (si disponible) ─────────────────────────
      if (eff.lottie_url) {
        try {
          var lottieDiv = document.createElement('div');
          lottieDiv.style.cssText = 'position:absolute;inset:0;z-index:1;pointer-events:none;';
          wrap.appendChild(lottieDiv);
          lottie.loadAnimation({ container: lottieDiv, path: eff.lottie_url, renderer: 'svg', loop: true, autoplay: true });
        } catch(e) {}
      }

      // ── Photo du contact ─────────────────────────────
      if (photoUrl) {
        var photoEl = document.getElementById('contact-photo');
        photoEl.src = photoUrl;
        photoEl.style.display = 'block';
        document.getElementById('occasion-emoji').style.display = 'none';
      }

      // ── Emoji occasion ───────────────────────────────
      var OCCASION_EMOJI = {
        birthday:'🎂', birthday_late:'🎂', nameday:'🌸', valentines:'💕',
        wedding:'💍', birth:'👶', graduation:'🎓', mothersday:'💐',
        fathersday:'👔', christmas:'🎄', newyear:'✨', support:'🤗',
        thanks:'🙏', courage:'💪', weekend:'🌞', universal:'🌟'
      };
      var occEmoji = OCCASION_EMOJI[card.occasion] || '🎉';
      document.getElementById('occasion-emoji').textContent = occEmoji;

      // ── Texte ─────────────────────────────────────────
      var overlay  = document.getElementById('text-overlay');
      var prefixEl = document.getElementById('prefix-text');
      var nameEl   = document.getElementById('name-text');
      var sufEl    = document.getElementById('suffix-text');

      overlay.className = 'pos-' + (cfg.position || 'center');
      var color = cfg.color || '#ffffff';
      var delay = cfg.animation_delay_ms || 600;
      var anim  = cfg.animation || 'fade_in';

      var displayName = card.mode === 'age'      ? (age || '')
                      : card.mode === 'age_name' ? ((age ? age + ' ans' : '') + (name ? ' • ' + name : ''))
                      : (name || '');

      var prefix = cfg.prefix || '';
      var suffix = cfg.suffix || '';

      prefixEl.style.color      = color;
      prefixEl.style.fontSize   = (cfg.prefix_size || 18) + 'px';
      prefixEl.textContent      = prefix;
      if (!prefix) prefixEl.style.display = 'none';

      // Coller le suffix au prénom sur la même ligne
      var nameWithSuffix = displayName ? (displayName + (suffix || '')) : '';
      nameEl.style.color        = color;
      nameEl.style.fontSize     = (cfg.name_size || 44) + 'px';
      nameEl.textContent        = nameWithSuffix;
      if (!nameWithSuffix) nameEl.style.display = 'none';

      sufEl.style.display = 'none'; // toujours masqué, géré dans le prénom

      overlay.style.opacity = '1';

      if (anim === 'typewriter' && displayName) {
        if (prefix) { prefixEl.style.opacity = '1'; }
        typewrite(nameEl, displayName, delay);
        if (suffix) { setTimeout(function(){ sufEl.style.opacity = '1'; }, delay + displayName.length * 60 + 200); }
      } else {
        if (prefix) animEl(prefixEl, anim, Math.max(0, delay - 300));
        if (displayName) animEl(nameEl, anim, delay);
        if (suffix) animEl(sufEl, anim, delay + 200);
      }

      // ── Ajuste la zone texte si message présent ──────────
      if (message) {
        document.getElementById('text-overlay').style.bottom = '200px';
      }

      // ── Message personnel ─────────────────────────────
      if (message) {
        var msgBox  = document.getElementById('message-box');
        var msgText = document.getElementById('message-text');
        var msgFrom = document.getElementById('message-from');
        msgText.textContent = message;
        if (sender) msgFrom.textContent = sender;
        msgBox.style.display = 'block';
      }

      document.getElementById('loading').style.display = 'none';
      document.title = displayName
        ? 'Une carte pour ' + displayName + ' 🎉'
        : 'Carte animée 🎉 — Confettis & Cake';

    } catch(err) { showError(); }
  }

  var muted = false;
  function toggleMute() {
    muted = !muted;
    if (bgAudio) bgAudio.volume = muted ? 0 : 0.4;
    document.getElementById('mute-btn').textContent = muted ? '🔇 Muet' : '🔊 Son';
  }

  // Démarrer la musique au premier tap (contourne l'autoplay mobile)
  if (bgKey) {
    var audioStarted = false;
    // Essai autoplay immédiat
    bgAudio.play().then(function() {
      audioStarted = true;
      document.getElementById('mute-btn').style.display = 'block';
      document.getElementById('music-hint').style.display = 'none';
    }).catch(function() {
      // Autoplay bloqué → afficher l'invite
      document.getElementById('music-hint').style.display = 'block';
    });
    // Démarre au premier tap sur la carte
    document.getElementById('card-wrap').addEventListener('click', function() {
      if (audioStarted) return;
      bgAudio.play().then(function() {
        audioStarted = true;
        document.getElementById('mute-btn').style.display = 'block';
        document.getElementById('music-hint').style.display = 'none';
      }).catch(function(){});
    });
  }

  function showError() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-box').style.display = 'flex';
  }

  loadCard();
  </script>
</body>
</html>
