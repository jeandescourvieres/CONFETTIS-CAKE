<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Un message vocal pour toi 💛 — Confettis &amp; Cake</title>

  <meta property="og:title"       content="🎙️ Un message vocal pour toi">
  <meta property="og:description" content="Appuie sur lecture pour entendre le message — envoyé avec Confettis &amp; Cake 🎂">
  <meta property="og:type"        content="website">
  <meta property="og:image"       content="https://confetticake.fr/og-vocal.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="🎙️ Un message vocal pour toi">
  <meta name="twitter:description" content="Appuie sur lecture pour entendre le message — envoyé avec Confettis &amp; Cake 🎂">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, #f5f0ff 0%, #fff0f6 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(155, 107, 181, 0.18);
      padding: 36px 28px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .logo { font-size: 13px; color: #9b6bb5; letter-spacing: 1px; text-transform: uppercase; font-weight: 600; margin-bottom: 20px; }
    .emoji-big { font-size: 56px; margin-bottom: 16px; display: block; }
    .title { font-size: 20px; font-weight: 800; color: #1a1a2e; margin-bottom: 8px; line-height: 1.3; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 32px; line-height: 1.5; }
    .play-btn {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, #9b6bb5, #c084fc);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 4px 20px rgba(155, 107, 181, 0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .play-btn:active { transform: scale(0.95); box-shadow: 0 2px 10px rgba(155, 107, 181, 0.3); }
    .play-btn svg { width: 36px; height: 36px; fill: white; }
    .status { font-size: 13px; color: #9b6bb5; font-weight: 600; margin-bottom: 28px; min-height: 20px; }
    .music-bar {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; padding: 10px 16px;
      background: #f5f0ff; border-radius: 99px;
      margin-bottom: 24px; font-size: 13px; color: #7c5a99;
    }
    .mute-btn {
      background: none; border: 1.5px solid #c084fc; border-radius: 99px;
      color: #9b6bb5; font-size: 12px; font-weight: 600;
      padding: 5px 14px; cursor: pointer; transition: background 0.15s;
    }
    .mute-btn:hover { background: #ede9fe; }
    .footer { margin-top: 28px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .footer-sent { font-size: 11px; color: #bbb; }
    .footer-sent a { color: #c084fc; text-decoration: none; }
    .footer-brand { font-size: 13px; color: #9b6bb5; font-weight: 700; letter-spacing: 0.8px; }
    .footer-brand span { font-size: 10px; font-weight: 400; letter-spacing: 0.3px; }
    .footer-tagline { font-size: 10px; color: #b08ec0; }
    .footer-url { font-size: 9px; color: #c4a8d4; font-weight: 600; letter-spacing: 0.2px; }
    .wave { display: flex; align-items: flex-end; justify-content: center; gap: 3px; height: 32px; margin-bottom: 24px; }
    .wave-bar {
      width: 4px; background: linear-gradient(135deg, #9b6bb5, #c084fc);
      border-radius: 99px; animation: wave 1.2s ease-in-out infinite; opacity: 0.3;
    }
    .wave-bar:nth-child(2) { animation-delay: 0.1s; }
    .wave-bar:nth-child(3) { animation-delay: 0.2s; }
    .wave-bar:nth-child(4) { animation-delay: 0.3s; }
    .wave-bar:nth-child(5) { animation-delay: 0.4s; }
    .wave-bar:nth-child(6) { animation-delay: 0.15s; }
    .wave-bar:nth-child(7) { animation-delay: 0.25s; }
    @keyframes wave { 0%, 100% { height: 6px; } 50% { height: 28px; } }
    .wave.playing .wave-bar { opacity: 1; }
    #errorMsg { color: #ef4444; font-size: 13px; margin-top: 8px; display: none; }
    .loading-dots { display: inline-flex; gap: 6px; margin-top: 16px; }
    .loading-dots span { width: 8px; height: 8px; background: #c084fc; border-radius: 50%; animation: dot 1.2s ease-in-out infinite; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } }
    /* ── Particules fond animé ── */
    #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 0; }
    .particle { position: absolute; bottom: -40px; font-size: 22px; animation: floatUp linear forwards; opacity: 0; }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg);   opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.8; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="particles"></div>
  <div class="card">
    <div class="logo">🎂 Confettis &amp; Cake</div>
    <span class="emoji-big" id="mainEmoji">🎙️</span>
    <div class="title" id="mainTitle">Chargement…</div>
    <div class="subtitle" id="mainSubtitle">
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>

    <button class="play-btn" id="playBtn" onclick="togglePlay()" style="display:none">
      <svg id="playIcon" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
    </button>
    <div class="status" id="status" style="display:none">Appuie pour écouter</div>
    <div id="errorMsg"></div>

    <div class="wave" id="wave" style="display:none">
      <div class="wave-bar" style="height:14px"></div>
      <div class="wave-bar" style="height:22px"></div>
      <div class="wave-bar" style="height:18px"></div>
      <div class="wave-bar" style="height:28px"></div>
      <div class="wave-bar" style="height:20px"></div>
      <div class="wave-bar" style="height:16px"></div>
      <div class="wave-bar" style="height:24px"></div>
    </div>

    <div class="music-bar" id="musicBar" style="display:none">
      <span>🎵 Fond sonore activé</span>
      <button class="mute-btn" id="muteBtn" onclick="toggleMute()">Couper</button>
    </div>

    <div class="footer">
      <div class="footer-sent">Envoyé avec <a href="https://confetticake.fr" target="_blank">confetticake.app</a></div>
      <div class="footer-brand"><span>by </span>🎂 CONFETTIS &amp; CAKE</div>
      <div class="footer-tagline">Des messages qui font chavirer les cœurs 💌</div>
      <div class="footer-url">confetticake.fr</div>
    </div>
  </div>

  <script>
    var SUPABASE_URL = 'https://rlwxcbnsqokpirhzzurj.supabase.co';

    var voiceAudio = null;
    var bgAudio    = null;
    var isPlaying  = false;
    var bgMuted    = false;
    var pauseIcon   = '<rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/>';
    var playIconSvg = '<polygon points="5,3 19,12 5,21"/>';
    var INTRO_MS    = 7000;

    var params   = new URLSearchParams(window.location.search);
    var msgId    = params.get('id')  || '';
    var bgParam  = params.get('bg')  || '';

    if (!msgId) {
      showError('Lien invalide — identifiant manquant.');
    } else {
      fetch(SUPABASE_URL + '/functions/v1/vocal-player?id=' + encodeURIComponent(msgId) + '&bg=' + encodeURIComponent(bgParam))
        .then(function(r) {
          if (!r.ok) throw new Error('http ' + r.status);
          return r.json();
        })
        .then(function(data) {
          if (!data.tts_url) throw new Error('no_tts');
          initPlayer(data.tts_url, data.bg_url, data.recipient, data.bg_theme || 'none');
        })
        .catch(function(e) {
          showError('Message introuvable ou lien expiré.');
        });
    }

    var BG_THEMES = {
      none:     { color: null,      particles: [] },
      auto:     { color: '#F8E8FF', particles: ['🎉','✨','🎊','⭐'] },
      birthday: { color: '#FFF3E0', particles: ['🎉','🎊','🥳','🎈'] },
      petales:  { color: '#FCE4EC', particles: ['🌸','🌺','🌼','💐'] },
      flocons:  { color: '#E3F2FD', particles: ['❄️','⛄','🌨','✨'] },
      coeurs:   { color: '#FCE4EC', particles: ['💝','💖','❤️','💕'] },
      etoiles:  { color: '#F3E5F5', particles: ['⭐','🌟','✨','💫'] },
    };

    var particleTimer = null;

    function spawnParticle(emojis) {
      var el = document.createElement('span');
      el.className = 'particle';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = (Math.random() * 100) + '%';
      var dur = 4 + Math.random() * 4;
      el.style.animationDuration = dur + 's';
      el.style.fontSize = (16 + Math.random() * 14) + 'px';
      document.getElementById('particles').appendChild(el);
      setTimeout(function() { el.remove(); }, dur * 1000);
    }

    function applyBgTheme(themeId) {
      var theme = BG_THEMES[themeId] || BG_THEMES['none'];
      if (theme.color) {
        document.body.style.background = 'linear-gradient(160deg, ' + theme.color + ' 0%, #fff 100%)';
      }
      if (theme.particles.length > 0) {
        particleTimer = setInterval(function() { spawnParticle(theme.particles); }, 600);
        // Burst initial
        for (var i = 0; i < 5; i++) {
          (function(delay) { setTimeout(function() { spawnParticle(theme.particles); }, delay); })(i * 150);
        }
      }
    }

    function initPlayer(ttsUrl, bgUrl, recipient, bgTheme) {
      var title = recipient ? ('Un message pour toi, ' + recipient + ' 💛') : 'Un message pour toi 💛';
      document.title = title + ' — Confettis & Cake';
      document.getElementById('mainTitle').textContent = title;
      document.getElementById('mainSubtitle').innerHTML = 'Appuie sur lecture pour entendre le message';
      applyBgTheme(bgTheme || 'none');

      voiceAudio = new Audio(ttsUrl);
      if (bgUrl) {
        bgAudio          = new Audio(bgUrl);
        bgAudio.loop     = true;
        bgAudio.volume   = 0.35;
        document.getElementById('musicBar').style.display = 'flex';
      }

      document.getElementById('playBtn').style.display  = 'flex';
      document.getElementById('status').style.display   = 'block';
      document.getElementById('wave').style.display     = 'flex';

      voiceAudio.addEventListener('ended', function() {
        isPlaying = false;
        document.getElementById('playIcon').innerHTML = playIconSvg;
        document.getElementById('status').textContent = '✓ Message écouté';
        document.getElementById('wave').classList.remove('playing');
        if (bgAudio) {
          // Musique seule pendant 6s après la voix, puis fondu sortant sur 4s
          var startVol = bgAudio.volume;
          setTimeout(function() {
            var steps = 40; var i = 0;
            var fade = setInterval(function() {
              i++; bgAudio.volume = Math.max(0, startVol * (1 - i / steps));
              if (i >= steps) { clearInterval(fade); bgAudio.pause(); bgAudio.currentTime = 0; bgAudio.volume = startVol; }
            }, 100);
          }, 6000);
        }
      });

      voiceAudio.addEventListener('error', function() {
        document.getElementById('status').textContent = '⚠️ Impossible de lire le message';
      });
    }

    function showError(msg) {
      document.getElementById('mainEmoji').textContent = '😕';
      document.getElementById('mainTitle').textContent = 'Message introuvable';
      document.getElementById('mainSubtitle').textContent = msg;
    }

    function startVoice() {
      document.getElementById('status').textContent = 'Lecture en cours...';
      var vp = voiceAudio.play();
      if (vp && typeof vp.catch === 'function') {
        vp.catch(function(e) {
          document.getElementById('status').textContent = '⚠️ Impossible de lire le message';
          document.getElementById('errorMsg').style.display = 'block';
          document.getElementById('errorMsg').textContent = e.message || 'Erreur lecture audio';
          isPlaying = false;
          document.getElementById('playIcon').innerHTML = playIconSvg;
          document.getElementById('wave').classList.remove('playing');
        });
      }
    }

    function togglePlay() {
      if (!voiceAudio) return;
      if (!isPlaying) {
        isPlaying = true;
        document.getElementById('playIcon').innerHTML = pauseIcon;
        document.getElementById('wave').classList.add('playing');
        if (bgAudio && !bgMuted) {
          bgAudio.volume = 0;
          var bp = bgAudio.play();
          if (bp && typeof bp.catch === 'function') bp.catch(function(){});
          // Fondu entrant sur 2 secondes
          var fadeInSteps = 40; var fi = 0;
          var fadeIn = setInterval(function() {
            fi++; bgAudio.volume = Math.min(0.35, 0.35 * fi / fadeInSteps);
            if (fi >= fadeInSteps) clearInterval(fadeIn);
          }, 50);
          var unlock = voiceAudio.play();
          if (unlock && typeof unlock.then === 'function') {
            unlock.then(function() { voiceAudio.pause(); voiceAudio.currentTime = 0; }).catch(function(){});
          } else {
            voiceAudio.pause(); voiceAudio.currentTime = 0;
          }
          document.getElementById('status').textContent = '🎵 Intro...';
          setTimeout(function() { if (!isPlaying) return; startVoice(); }, INTRO_MS);
        } else {
          startVoice();
        }
      } else {
        voiceAudio.pause();
        if (bgAudio) bgAudio.pause();
        isPlaying = false;
        document.getElementById('playIcon').innerHTML = playIconSvg;
        document.getElementById('status').textContent = 'Appuie pour reprendre';
        document.getElementById('wave').classList.remove('playing');
      }
    }

    function toggleMute() {
      var btn = document.getElementById('muteBtn');
      if (!bgMuted) {
        if (bgAudio) bgAudio.volume = 0;
        bgMuted = true; btn.textContent = 'Rétablir';
      } else {
        if (bgAudio) bgAudio.volume = 0.35;
        bgMuted = false; btn.textContent = 'Couper';
      }
    }
  </script>
</body>
</html>
